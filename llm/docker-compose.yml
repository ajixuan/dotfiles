services:
  postgres:
    image: postgres:17-alpine
    container_name: skip-code-postgres
    environment:
      POSTGRES_USER: skip-code
      POSTGRES_PASSWORD: skip-code
      POSTGRES_DB: skip-code
    volumes:
      - skip-code-postgres-data:/var/lib/postgresql/data
    networks:
      - skip-code-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skip-code -d skip-code"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  skip-code-net:
    name: skip-code-net
    driver: bridge

volumes:
  skip-code-postgres-data:
    name: skip-code-postgres-data
